<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PianoLab — Módulo 1</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Hub pode rolar — não é tela de exercício */
    html, body { overflow: auto; height: auto; }

    .hub {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Hero ──────────────────────────────────────────────── */
    .hero {
      padding: 24px 20px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .hero__back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: var(--sm);
      color: var(--text-soft);
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .hero__back:hover { color: var(--text); }

    .hero__logo   { font-size: 2rem; margin-bottom: 2px; }
    .hero__titulo { font-size: var(--xl); font-weight: 900; letter-spacing: -.5px; }
    .hero__sub    { font-size: var(--sm); color: var(--text-soft); margin-top: 4px; }

    .hero__progresso {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prog-wrap {
      flex: 1;
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .prog-bar {
      height: 100%;
      background: var(--nota-do);
      border-radius: 99px;
      width: 0%;
      transition: width .6s ease;
    }

    .prog-label {
      font-size: var(--sm);
      font-weight: 700;
      color: var(--nota-do);
      white-space: nowrap;
    }

    /* ── Seção ─────────────────────────────────────────────── */
    .secao-titulo {
      font-size: var(--sm);
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 16px 8px;
    }

    /* ── Cards ─────────────────────────────────────────────── */
    .exercicios { display: flex; flex-direction: column; gap: 10px; padding: 0 16px 24px; }

    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--rad);
      text-decoration: none;
      color: var(--text);
      transition: border-color .15s, background .15s, transform .1s;
      touch-action: manipulation;
    }

    .card.disponivel { cursor: pointer; }
    .card.disponivel:active { transform: scale(.98); }
    .card.disponivel:hover  {
      border-color: var(--cor, var(--nota-do));
      background: color-mix(in srgb, var(--cor, var(--nota-do)) 8%, var(--surface));
    }

    .card.concluido {
      border-color: var(--success);
      background: color-mix(in srgb, var(--success) 6%, var(--surface));
    }

    .card.bloqueado { opacity: .4; cursor: default; pointer-events: none; }

    .card__icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: var(--cor, var(--surface2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }

    .card.bloqueado .card__icon { background: var(--surface2); color: var(--text-soft); }
    .card.concluido .card__icon { font-size: 1.5rem; }

    .card__info { flex: 1; min-width: 0; }
    .card__nome { font-size: var(--md); font-weight: 700; line-height: 1.2; }
    .card__desc { font-size: var(--sm); color: var(--text-soft); margin-top: 2px;
                  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card__acao { font-size: 1.2rem; flex-shrink: 0; }

    /* ── Rodapé ────────────────────────────────────────────── */
    .footer {
      margin-top: auto;
      padding: 16px;
      text-align: center;
      font-size: var(--sm);
      color: var(--text-soft);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div class="hub">

  <div class="hero">
    <button class="hero__back" onclick="goToIndex()">← PianoLab</button>
    <div class="hero__logo">🎹</div>
    <div class="hero__titulo">Módulo 1</div>
    <div class="hero__sub">Conhecendo as Teclas</div>
    <div class="hero__progresso">
      <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
      <span class="prog-label" id="prog-label">0 / 2</span>
    </div>
  </div>

  <div class="secao-titulo">Exercícios</div>
  <div class="exercicios" id="lista-exercicios"></div>

  <div class="footer">PianoLab · 2026</div>

</div>
<script src="base.js"></script>
<script>
'use strict';

const EXERCICIOS = [
  {
    n: 1, href: 'm1_ex1.html',
    nome: 'O Dó Central',
    desc: '3 fases · a primeira nota',
    cor:  'var(--nota-do)',
    key:  'piano_m1_ex1_progresso',
  },
  {
    n: 2, href: 'm1_ex2.html',
    nome: 'As 5 Primeiras Notas',
    desc: '7 fases · Dó Ré Mi Fá Sol',
    cor:  'var(--nota-re)',
    key:  'piano_m1_ex2_progresso',
  },
  {
    n: 3, href: 'm1_ex3.html',
    nome: 'As 7 Notas',
    desc: 'em breve · + Lá e Si',
    cor:  'var(--nota-mi)',
    key:  'piano_m1_ex3_progresso',
  },
];

// Ex 3 bloqueado até Ex 2 concluído
const SEMPRE_DISPONIVEIS = new Set([1, 2]);

function progresso(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; }
}

function build() {
  const lista = document.getElementById('lista-exercicios');
  let concluidos = 0;

  EXERCICIOS.forEach((ex, i) => {
    const done     = progresso(ex.key)?.completo === true;
    const prevDone = i === 0 || progresso(EXERCICIOS[i - 1].key)?.completo === true;
    const livre    = SEMPRE_DISPONIVEIS.has(ex.n) || prevDone;

    if (done) concluidos++;
    const estado = done ? 'concluido' : livre ? 'disponivel' : 'bloqueado';
    const icone  = done ? '✓' : livre ? ex.n : '🔒';
    const acao   = done ? '✅' : livre ? '▶' : '🔒';

    const el = document.createElement(livre ? 'a' : 'div');
    el.className = `card ${estado}`;
    el.style.setProperty('--cor', ex.cor);
    if (livre) el.href = ex.href;

    el.innerHTML = `
      <div class="card__icon">${icone}</div>
      <div class="card__info">
        <div class="card__nome">Ex ${ex.n} · ${ex.nome}</div>
        <div class="card__desc">${ex.desc}</div>
      </div>
      <div class="card__acao">${acao}</div>`;
    lista.appendChild(el);
  });

  // Conta apenas os que têm arquivo real (Ex 1 e Ex 2)
  const total = EXERCICIOS.filter(e => SEMPRE_DISPONIVEIS.has(e.n)).length;
  const pct   = total > 0 ? Math.round((concluidos / total) * 100) : 0;
  document.getElementById('prog-bar').style.width  = pct + '%';
  document.getElementById('prog-label').textContent = `${concluidos} / ${total}`;
}

build();
</script>
</body>
</html>
