<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PianoLab</title>
  <link rel="stylesheet" href="base.css">
  <style>
    html, body { overflow: auto; height: auto; background: #0d1117; color: #e8eaed; }

    .hub {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Hero ──────────────────────────────────────────────── */
    .hero {
      padding: 32px 20px 24px;
      background: linear-gradient(160deg, #141e2e 0%, #0d1117 100%);
      border-bottom: 1px solid #1e2a3a;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,195,247,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero__badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #4FC3F7;
      background: rgba(79,195,247,.12);
      border: 1px solid rgba(79,195,247,.25);
      border-radius: 99px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }
    .hero__titulo {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      color: #fff;
    }
    .hero__titulo span { color: #4FC3F7; }
    .hero__sub {
      font-size: 14px;
      color: #7a8fa8;
      margin-top: 8px;
      line-height: 1.5;
    }
    .hero__progresso {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .prog-wrap {
      flex: 1;
      height: 6px;
      background: #1e2a3a;
      border-radius: 99px;
      overflow: hidden;
    }
    .prog-bar {
      height: 100%;
      background: linear-gradient(90deg, #4FC3F7, #81d4fa);
      border-radius: 99px;
      width: 0%;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }
    .prog-label {
      font-size: 12px;
      font-weight: 700;
      color: #4FC3F7;
      white-space: nowrap;
    }

    /* ── Seção ─────────────────────────────────────────────── */
    .secao-titulo {
      font-size: 11px;
      font-weight: 700;
      color: #4a6274;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 20px 20px 10px;
    }

    /* ── Cards ─────────────────────────────────────────────── */
    .modulos { display: flex; flex-direction: column; gap: 8px; padding: 0 16px 32px; }

    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #141e2e;
      border: 1.5px solid #1e2a3a;
      border-radius: 14px;
      text-decoration: none;
      color: #e8eaed;
      transition: border-color .15s, background .15s, transform .1s;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--cor, #4FC3F7);
      opacity: 0;
      transition: opacity .15s;
    }
    .card.disponivel { cursor: pointer; }
    .card.disponivel:active { transform: scale(.98); }
    .card.disponivel:hover  {
      border-color: var(--cor, #4FC3F7);
      background: color-mix(in srgb, var(--cor, #4FC3F7) 6%, #141e2e);
    }
    .card.disponivel:hover::before { opacity: 1; }
    .card.concluido {
      border-color: rgba(79,195,247,.4);
      background: rgba(79,195,247,.05);
    }
    .card.concluido::before { opacity: 1; background: #4FC3F7; }
    .card.bloqueado { opacity: .35; cursor: default; pointer-events: none; }

    .card__num {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: color-mix(in srgb, var(--cor, #4FC3F7) 15%, #1e2a3a);
      border: 1.5px solid color-mix(in srgb, var(--cor, #4FC3F7) 30%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900;
      color: var(--cor, #4FC3F7);
      flex-shrink: 0;
      transition: background .15s;
    }
    .card.concluido .card__num { font-size: 20px; }
    .card.bloqueado .card__num { background: #1a2230; border-color: #1e2a3a; color: #3a4a5a; }

    .card__info { flex: 1; min-width: 0; }
    .card__nome {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      color: #e8eaed;
    }
    .card__desc {
      font-size: 12px;
      color: #5a7a8a;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card.disponivel .card__desc { color: #6a8a9a; }

    .card__seta {
      font-size: 16px;
      color: #3a5a6a;
      flex-shrink: 0;
      transition: transform .15s, color .15s;
    }
    .card.disponivel:hover .card__seta { transform: translateX(3px); color: var(--cor, #4FC3F7); }
    .card.concluido .card__seta { color: #4FC3F7; }

    /* ── Demo card especial ─────────────────────────────────── */
    .card-demo {
      background: linear-gradient(135deg, #0f1c2e 0%, #141e2e 100%);
      border-color: rgba(79,195,247,.2);
    }
    .card-demo:hover { border-color: rgba(79,195,247,.5) !important; }

    /* ── Rodapé ─────────────────────────────────────────────── */
    .footer {
      margin-top: auto;
      padding: 20px;
      text-align: center;
      font-size: 11px;
      color: #2a3a4a;
      border-top: 1px solid #1a2230;
    }
  </style>
</head>
<body>
<div class="hub">

  <div class="hero">
    <div class="hero__badge">🎹 Curso de Piano</div>
    <div class="hero__titulo">Piano<span>Lab</span></div>
    <div class="hero__sub">Aprenda piano do zero — notas, escalas, acordes e muito mais.</div>
    <div class="hero__progresso">
      <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
      <span class="prog-label" id="prog-label">0 / 5 módulos</span>
    </div>
  </div>

  <div class="secao-titulo">Explorar</div>
  <div class="modulos">
    <a href="demo.html" class="card disponivel card-demo" style="--cor:#4FC3F7">
      <div class="card__num">🎵</div>
      <div class="card__info">
        <div class="card__nome">Piano Livre</div>
        <div class="card__desc">Toque e explore o teclado à vontade</div>
      </div>
      <div class="card__seta">›</div>
    </a>
  </div>

  <div class="secao-titulo">Módulos do curso</div>
  <div class="modulos" id="lista-modulos"></div>

  <div class="footer">PianoLab · 2026</div>

</div>
<script src="base.js"></script>
<script>
'use strict';

// Novo currículo — 5 módulos
const MODULOS = [
  {
    n: 1,
    href: 'm1_hub.html',
    nome: 'Conhecendo as Teclas',
    desc: '3 exercícios · Dó, 5 notas, 7 notas brancas',
    cor: 'var(--nota-do)',
    // M1 completo = Ex1 + Ex2 + Ex3 todos concluídos
    keys: ['piano_m1_ex1_progresso', 'piano_m1_ex2_progresso', 'piano_m1_ex3_progresso'],
  },
  {
    n: 2,
    href: 'm2_escalas.html',
    nome: 'Escalas',
    desc: '7 escalas maiores · Dó, Ré, Mi, Fá, Sol, Lá, Si',
    cor: 'var(--nota-re)',
    keys: ['piano_m2_progresso'],
  },
  {
    n: 3,
    href: 'm3_acordes.html',
    nome: 'Acordes',
    desc: 'em breve · maior, menor, com sétima',
    cor: 'var(--nota-mi)',
    keys: ['piano_m3_progresso'],
  },
  {
    n: 4,
    href: 'm4_campo.html',
    nome: 'Campo Harmônico',
    desc: 'em breve',
    cor: 'var(--nota-fa)',
    keys: ['piano_m4_progresso'],
  },
  {
    n: 5,
    href: 'm5_progressoes.html',
    nome: 'Progressões',
    desc: 'em breve',
    cor: 'var(--nota-sol)',
    keys: ['piano_m5_progresso'],
  },
];

// Módulos com arquivo real publicado
const PUBLICADOS = new Set([1, 2]);

function getProgresso(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; }
}

function isCompleto(modulo) {
  return modulo.keys.every(k => getProgresso(k)?.completo === true);
}

function build() {
  const lista = document.getElementById('lista-modulos');
  let concluidos = 0;

  MODULOS.forEach((m, i) => {
    const done     = isCompleto(m);
    const prevDone = i === 0 || isCompleto(MODULOS[i - 1]);
    const pub      = PUBLICADOS.has(m.n);
    const livre    = pub || prevDone || done;

    if (done) concluidos++;

    const estado = done ? 'concluido' : livre ? 'disponivel' : 'bloqueado';
    const numIcon = done ? '✓' : livre ? m.n : '🔒';
    const seta    = done ? '✓' : '›';

    const el = document.createElement(livre ? 'a' : 'div');
    el.className = `card ${estado}`;
    el.style.setProperty('--cor', m.cor);
    if (livre) el.href = m.href;

    el.innerHTML = `
      <div class="card__num">${numIcon}</div>
      <div class="card__info">
        <div class="card__nome">M${m.n} · ${m.nome}</div>
        <div class="card__desc">${m.desc}</div>
      </div>
      <div class="card__seta">${seta}</div>`;
    lista.appendChild(el);
  });

  const pct = Math.round((concluidos / MODULOS.length) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent =
    concluidos === 0 ? '0 / 5 módulos' : `${concluidos} / 5 módulos`;
}

build();
</script>
</body>
</html>
