<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>M0 · Piano Bebê — PianoLab</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="piano.css">
  <style>
    html {
      height: 100dvh; max-height: 100dvh;
      background: #0d1117;
    }
    body {
      height: 100dvh; max-height: 100dvh;
      max-width: 480px; margin: 0 auto;
      overflow: hidden;
      background: #0d1117;
      display: flex; flex-direction: column;
    }

    /* ── Topo ── */
    .topo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px 4px;
      flex-shrink: 0;
    }
    .btn-voltar {
      background: none; border: none;
      color: #4FC3F7; font-size: 1.3rem;
      cursor: pointer; padding: 4px;
      line-height: 1;
    }
    .titulo-bebe {
      font-size: 1.3rem;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: -0.5px;
    }

    /* ── Linha de instrumentos ── */
    .instrumento-row {
      display: flex;
      gap: 6px;
      padding: 2px 14px 4px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .instrumento-btn {
      padding: 6px 14px;
      border-radius: 99px;
      border: 2px solid #1e2a3a;
      background: #111827;
      color: #e8eaed;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .instrumento-btn.ativo {
      border-color: #FFD700;
      background: #1c2215;
      color: #FFD700;
    }

    /* ── Linha de velocidade ── */
    .speed-row {
      display: flex;
      gap: 4px;
      padding: 0 14px 3px;
      flex-shrink: 0;
      align-items: center;
    }
    .speed-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #4a6274;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-right: 2px;
    }
    .speed-btn {
      padding: 3px 10px;
      border-radius: 99px;
      border: 1.5px solid #1e2a3a;
      background: #111827;
      color: #7a8fa8;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .speed-btn.ativo {
      border-color: #4FC3F7;
      background: rgba(79,195,247,.1);
      color: #4FC3F7;
    }

    /* ── Grid de músicas compacto ── */
    .musicas-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 6px;
      padding: 2px 14px;
      flex-shrink: 0;
    }
    .musica-card {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      border-left: 2px solid transparent;
      border-radius: 4px;
    }
    .musica-card.tocando { border-color: #4FC3F7; background: rgba(79,195,247,.06); }
    .musica-card.guiando { border-color: #81C784; background: rgba(129,199,132,.06); }
    .musica-simbolo {
      font-size: 0.78rem;
      font-weight: 800;
      color: #5a7a9a;
      flex-shrink: 0;
      min-width: 26px;
      letter-spacing: 0.3px;
    }
    .musica-card.tocando .musica-simbolo,
    .musica-card.guiando .musica-simbolo { color: #e8eaed; }
    .musica-btns {
      display: flex;
      gap: 3px;
      margin-left: auto;
    }
    .btn-auto, .btn-guia, .btn-parar-card {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: none;
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-auto       { background: #4FC3F7; color: #111; }
    .btn-guia       { background: #81C784; color: #111; }
    .btn-parar-card { background: #F44336; color: #fff; display: none; }
    .btn-auto:active, .btn-guia:active { opacity: 0.75; }

    /* ── Piano stage ── */
    .piano-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      padding: 6px 8px 8px;
      --key-h: clamp(100px, 35dvh, 260px);
      --key-bk-h: clamp(62px, 22dvh, 161px);
    }
    #piano-container {
      width: 100%;
      display: flex;
      align-items: center;
    }
    .piano-stage .piano-wrap.responsive { width: 100%; overflow: visible; padding-bottom: 0; }
    .piano-stage .piano.responsive { width: 100%; }
    .piano-stage .key { border-color: #444; }
    .piano-stage .key__label {
      font-size: 1.3rem;
      color: #888;
    }

    /* Indicador de nota guia */
    .nota-guia-label {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(129, 199, 132, 0.9);
      color: #111;
      font-size: 1rem;
      font-weight: 900;
      padding: 6px 18px;
      border-radius: 99px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }
    .nota-guia-label.visivel { opacity: 1; }

    /* Landscape compacto */
    @media (orientation: landscape) and (max-height: 500px) {
      .topo { padding: 2px 12px 1px; }
      .titulo-bebe { font-size: 0.95rem; }
      .instrumento-row { padding: 1px 12px 1px; gap: 4px; }
      .instrumento-btn { padding: 3px 9px; font-size: 0.8rem; }
      .speed-row { padding: 0 12px 1px; gap: 3px; }
      .speed-btn { padding: 2px 7px; font-size: 0.75rem; }
      .musicas-grid { gap: 1px 4px; padding: 1px 12px; grid-template-columns: repeat(4, 1fr); }
      .musica-card { padding: 1px 2px; }
      .musica-simbolo { font-size: 0.7rem; min-width: 22px; }
      .btn-auto, .btn-guia, .btn-parar-card { width: 18px; height: 18px; font-size: 0.55rem; }
      .piano-stage { padding: 2px 6px 4px; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <button class="btn-voltar" onclick="location.href='index.html'">←</button>
    <div class="titulo-bebe">🎹 Piano Bebê</div>
  </div>

  <div class="instrumento-row">
    <button class="instrumento-btn ativo" data-inst="piano">🎹 Piano</button>
    <button class="instrumento-btn" data-inst="cat">🐱 Gatinho</button>
    <button class="instrumento-btn" data-inst="duck">🐣 Patinho</button>
    <a href="m0_bateria.html" class="instrumento-btn" style="text-decoration:none">🥁 Bateria</a>
  </div>

  <div class="speed-row">
    <span class="speed-label">Ritmo</span>
    <button class="speed-btn" data-speed="60">🐌</button>
    <button class="speed-btn ativo" data-speed="100">▶</button>
    <button class="speed-btn" data-speed="150">🐇</button>
  </div>

  <div class="musicas-grid" id="musicas-grid"></div>

  <div class="piano-stage" id="piano-stage">
    <div id="piano-container"></div>
  </div>

  <div class="nota-guia-label" id="guia-label"></div>

  <script src="base.js"></script>
  <script>
  'use strict';

  /* ══════════════════════════════════════════════
     Síntese de animais — Web Audio API melhorada
  ══════════════════════════════════════════════ */
  let actx = null;
  function getActx() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }
  function midiHz(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

  const AnimalSynth = {
    // Gato: síntese formântica com dois picos de ressonância (miau realista)
    cat(midi) {
      const c = getActx(), now = c.currentTime;
      const hz = midiHz(midi);

      const osc = c.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(hz * 1.55, now);
      osc.frequency.exponentialRampToValueAtTime(hz * 0.82, now + 0.14);
      osc.frequency.linearRampToValueAtTime(hz * 0.96, now + 0.28);
      osc.frequency.linearRampToValueAtTime(hz * 0.85, now + 0.65);

      const lfo = c.createOscillator(), lfoG = c.createGain();
      lfo.frequency.value = 5.5;
      lfoG.gain.value = hz * 0.018;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);

      const f1 = c.createBiquadFilter();
      f1.type = 'bandpass';
      f1.frequency.value = Math.min(hz * 2.2, 900);
      f1.Q.value = 8;

      const f2 = c.createBiquadFilter();
      f2.type = 'bandpass';
      f2.frequency.value = Math.min(hz * 4.5, 2000);
      f2.Q.value = 6;

      const g1 = c.createGain(); g1.gain.value = 0.55;
      const g2 = c.createGain(); g2.gain.value = 0.38;
      const master = c.createGain();
      master.gain.setValueAtTime(0, now);
      master.gain.linearRampToValueAtTime(0.75, now + 0.025);
      master.gain.setValueAtTime(0.75, now + 0.12);
      master.gain.exponentialRampToValueAtTime(0.3, now + 0.3);
      master.gain.setValueAtTime(0.3, now + 0.42);
      master.gain.exponentialRampToValueAtTime(0.001, now + 0.72);

      osc.connect(f1); f1.connect(g1); g1.connect(master);
      osc.connect(f2); f2.connect(g2); g2.connect(master);
      master.connect(c.destination);

      lfo.start(now); osc.start(now);
      lfo.stop(now + 0.9); osc.stop(now + 0.9);
    },

    // Pato: onda quadrada com chirp ascendente-descendente (quack)
    duck(midi) {
      const c = getActx(), now = c.currentTime;
      const hz = midiHz(midi);

      const osc1 = c.createOscillator();
      osc1.type = 'square';
      osc1.frequency.setValueAtTime(hz * 0.58, now);
      osc1.frequency.exponentialRampToValueAtTime(hz * 1.15, now + 0.05);
      osc1.frequency.exponentialRampToValueAtTime(hz * 0.72, now + 0.14);
      osc1.frequency.linearRampToValueAtTime(hz * 0.62, now + 0.24);

      const osc2 = c.createOscillator();
      osc2.type = 'sawtooth';
      osc2.frequency.setValueAtTime(hz * 0.6, now);
      osc2.frequency.exponentialRampToValueAtTime(hz * 1.18, now + 0.05);
      osc2.frequency.exponentialRampToValueAtTime(hz * 0.75, now + 0.14);

      const nasal = c.createBiquadFilter();
      nasal.type = 'peaking';
      nasal.frequency.value = 1100;
      nasal.Q.value = 2.5;
      nasal.gain.value = 10;

      const lp = c.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 2800;

      const g1 = c.createGain(); g1.gain.value = 0.5;
      const g2 = c.createGain(); g2.gain.value = 0.22;
      const master = c.createGain();
      master.gain.setValueAtTime(0, now);
      master.gain.linearRampToValueAtTime(0.85, now + 0.01);
      master.gain.exponentialRampToValueAtTime(0.45, now + 0.07);
      master.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

      osc1.connect(g1); g1.connect(nasal); nasal.connect(lp); lp.connect(master);
      osc2.connect(g2); g2.connect(master);
      master.connect(c.destination);

      osc1.start(now); osc2.start(now);
      osc1.stop(now + 0.38); osc2.stop(now + 0.38);
    },
  };

  /* ══════════════════════════════════════════════
     Mapeamento de letra → nota (oitava 4)
  ══════════════════════════════════════════════ */
  const NOTE_MAP = { C:'C4', D:'D4', E:'E4', F:'F4', G:'G4', A:'A4', B:'B4' };

  /* ══════════════════════════════════════════════
     Repertório — formato BPM + durações relativas
     d: 0.5=colcheia  1=semínima  2=mínima  1.5=semínima pontuada
  ══════════════════════════════════════════════ */
  const SONGS = [
    { nome:"Twinkle Twinkle", icone:"⭐", bpm:100, notas:[
      {n:"C",d:1},{n:"C",d:1},{n:"G",d:1},{n:"G",d:1},{n:"A",d:1},{n:"A",d:1},{n:"G",d:2},
      {n:"F",d:1},{n:"F",d:1},{n:"E",d:1},{n:"E",d:1},{n:"D",d:1},{n:"D",d:1},{n:"C",d:2},
      {n:"G",d:1},{n:"G",d:1},{n:"F",d:1},{n:"F",d:1},{n:"E",d:1},{n:"E",d:1},{n:"D",d:2},
      {n:"G",d:1},{n:"G",d:1},{n:"F",d:1},{n:"F",d:1},{n:"E",d:1},{n:"E",d:1},{n:"D",d:2},
      {n:"C",d:1},{n:"C",d:1},{n:"G",d:1},{n:"G",d:1},{n:"A",d:1},{n:"A",d:1},{n:"G",d:2},
      {n:"F",d:1},{n:"F",d:1},{n:"E",d:1},{n:"E",d:1},{n:"D",d:1},{n:"D",d:1},{n:"C",d:2},
    ]},
    { nome:"Old MacDonald", icone:"🐄", bpm:110, notas:[
      {n:"G",d:1},{n:"G",d:1},{n:"G",d:1},{n:"D",d:1},{n:"E",d:1},{n:"E",d:1},{n:"D",d:2},
      {n:"B",d:1},{n:"B",d:1},{n:"A",d:1},{n:"A",d:1},{n:"G",d:2},
      {n:"D",d:1},{n:"E",d:1},{n:"E",d:1},{n:"D",d:2},
      {n:"G",d:1},{n:"G",d:1},{n:"G",d:1},{n:"G",d:1},
      {n:"D",d:1},{n:"E",d:1},{n:"E",d:1},{n:"D",d:2},
      {n:"B",d:1},{n:"B",d:1},{n:"A",d:1},{n:"A",d:1},{n:"G",d:2},
    ]},
    { nome:"London Bridge", icone:"🌉", bpm:120, notas:[
      {n:"G",d:1},{n:"A",d:0.5},{n:"G",d:0.5},{n:"F",d:1},{n:"E",d:1},{n:"F",d:0.5},{n:"G",d:2},
      {n:"D",d:1},{n:"E",d:0.5},{n:"F",d:1},{n:"E",d:0.5},{n:"F",d:0.5},{n:"G",d:2},
      {n:"G",d:1},{n:"A",d:0.5},{n:"G",d:0.5},{n:"F",d:1},{n:"E",d:1},{n:"F",d:0.5},{n:"G",d:2},
      {n:"D",d:1},{n:"G",d:1},{n:"E",d:1},{n:"C",d:2},
    ]},
    { nome:"Mary Had a Little Lamb", icone:"🐑", bpm:110, notas:[
      {n:"E",d:1},{n:"D",d:1},{n:"C",d:1},{n:"D",d:1},{n:"E",d:1},{n:"E",d:1},{n:"E",d:2},
      {n:"D",d:1},{n:"D",d:1},{n:"D",d:2},{n:"E",d:1},{n:"G",d:1},{n:"G",d:2},
      {n:"E",d:1},{n:"D",d:1},{n:"C",d:1},{n:"D",d:1},{n:"E",d:1},{n:"E",d:1},{n:"E",d:1},{n:"E",d:1},
      {n:"D",d:1},{n:"D",d:1},{n:"E",d:1},{n:"D",d:1},{n:"C",d:2},
    ]},
    { nome:"Ode to Joy", icone:"🎵", bpm:100, notas:[
      {n:"E",d:1},{n:"E",d:1},{n:"F",d:1},{n:"G",d:1},{n:"G",d:1},{n:"F",d:1},{n:"E",d:1},{n:"D",d:1},
      {n:"C",d:1},{n:"C",d:1},{n:"D",d:1},{n:"E",d:1},{n:"E",d:1.5},{n:"D",d:0.5},{n:"D",d:2},
      {n:"E",d:1},{n:"E",d:1},{n:"F",d:1},{n:"G",d:1},{n:"G",d:1},{n:"F",d:1},{n:"E",d:1},{n:"D",d:1},
      {n:"C",d:1},{n:"C",d:1},{n:"D",d:1},{n:"E",d:1},{n:"D",d:1.5},{n:"C",d:0.5},{n:"C",d:2},
    ]},
    { nome:"Are You Sleeping", icone:"😴", bpm:100, notas:[
      {n:"C",d:1},{n:"D",d:1},{n:"E",d:1},{n:"C",d:1},
      {n:"C",d:1},{n:"D",d:1},{n:"E",d:1},{n:"C",d:1},
      {n:"E",d:1},{n:"F",d:1},{n:"G",d:2},
      {n:"E",d:1},{n:"F",d:1},{n:"G",d:2},
      {n:"G",d:0.5},{n:"A",d:0.5},{n:"G",d:0.5},{n:"F",d:0.5},{n:"E",d:1},{n:"C",d:1},
      {n:"G",d:0.5},{n:"A",d:0.5},{n:"G",d:0.5},{n:"F",d:0.5},{n:"E",d:1},{n:"C",d:1},
      {n:"C",d:1},{n:"G",d:1},{n:"C",d:2},
      {n:"C",d:1},{n:"G",d:1},{n:"C",d:2},
    ]},
    { nome:"Baby Shark", icone:"🦈", bpm:130, notas:[
      {n:"B",d:0.5},{n:"B",d:0.5},{n:"B",d:0.5},{n:"B",d:0.5},{n:"B",d:1},{n:"C",d:2},
      {n:"A",d:0.5},{n:"A",d:0.5},{n:"A",d:0.5},{n:"A",d:0.5},{n:"A",d:1},{n:"B",d:2},
      {n:"G",d:0.5},{n:"G",d:0.5},{n:"G",d:0.5},{n:"G",d:0.5},{n:"G",d:1},{n:"A",d:2},
      {n:"E",d:0.5},{n:"E",d:0.5},{n:"E",d:0.5},{n:"E",d:0.5},{n:"E",d:1},{n:"F",d:2},
      {n:"D",d:0.5},{n:"D",d:0.5},{n:"D",d:0.5},{n:"D",d:0.5},{n:"D",d:1},{n:"E",d:2},
    ]},
  ];

  /* ══════════════════════════════════════════════
     Estado
  ══════════════════════════════════════════════ */
  let instrumento  = 'piano';
  let speedPercent = 100;

  function tocarNota(noteStr, dur = 0.8) {
    if (instrumento === 'piano') {
      AudioEngine.play(noteStr, dur);
    } else {
      const midi = noteToMidi(noteStr);
      if (midi !== null) AnimalSynth[instrumento](midi);
    }
  }

  /* ══════════════════════════════════════════════
     Renderização dinâmica do grid de músicas
  ══════════════════════════════════════════════ */
  const grid = document.getElementById('musicas-grid');
  SONGS.forEach((song, i) => {
    const card = document.createElement('div');
    card.className = 'musica-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <span class="musica-simbolo">${song.icone}${i + 1}</span>
      <div class="musica-btns">
        <button class="btn-auto"       data-idx="${i}" title="Tocar automático">▶</button>
        <button class="btn-guia"       data-idx="${i}" title="Guiar nota a nota">👆</button>
        <button class="btn-parar-card" data-idx="${i}" style="display:none">■</button>
      </div>`;
    grid.appendChild(card);
  });

  /* ══════════════════════════════════════════════
     Engine de músicas
  ══════════════════════════════════════════════ */
  let songTimer = null, tocando = false, modoGuia = false;
  let songIdx = -1, noteIdx = 0;          // songIdx = índice em SONGS; noteIdx = posição na nota
  let notaEsperada = null, guiaTimer = null;

  function pararTudo() {
    if (songTimer) { clearTimeout(songTimer); songTimer = null; }
    if (guiaTimer) { clearTimeout(guiaTimer); guiaTimer = null; }
    tocando = false; modoGuia = false;
    notaEsperada = null;
    document.querySelectorAll('.musica-card').forEach(c => c.classList.remove('tocando','guiando'));
    document.querySelectorAll('.btn-parar-card').forEach(b => b.style.display = 'none');
    document.querySelectorAll('.btn-auto, .btn-guia').forEach(b => b.style.display = '');
    document.getElementById('guia-label').classList.remove('visivel');
    kb.releaseAll();
    songIdx = -1; noteIdx = 0;
  }

  function iniciarMusica(idx, guia) {
    pararTudo();
    const song = SONGS[idx];
    if (!song) return;

    if (instrumento === 'piano') AudioEngine.init();
    else getActx();

    songIdx = idx; noteIdx = 0;
    tocando = true; modoGuia = guia;

    const card = document.getElementById('card-' + idx);
    card.classList.add(guia ? 'guiando' : 'tocando');
    card.querySelector('.btn-parar-card').style.display = 'flex';
    card.querySelector('.btn-auto').style.display = 'none';
    card.querySelector('.btn-guia').style.display = 'none';

    guia ? tocarGuia() : tocarAuto();
  }

  // ── Modo automático (engine BPM-relativo, sequential chain) ──
  function tocarAuto() {
    const song = SONGS[songIdx];
    if (!tocando || !song || noteIdx >= song.notas.length) { pararTudo(); return; }
    const { n, d } = song.notas[noteIdx];
    const noteStr = NOTE_MAP[n];
    const beatDuration = (60 / song.bpm) * (100 / speedPercent);
    const noteDuration = beatDuration * d;
    kb.releaseAll();
    kb.highlight(noteStr);
    tocarNota(noteStr, noteDuration * 0.85);
    noteIdx++;
    songTimer = setTimeout(tocarAuto, noteDuration * 1000);
  }

  // ── Modo guia (criança toca — sem som automático) ──
  function tocarGuia() {
    const song = SONGS[songIdx];
    if (!modoGuia || !song || noteIdx >= song.notas.length) { pararTudo(); return; }
    const { n } = song.notas[noteIdx];
    const noteStr = NOTE_MAP[n];
    kb.releaseAll();
    kb.highlight(noteStr);
    notaEsperada = noteStr;

    const label = document.getElementById('guia-label');
    label.textContent = n;   // letra simples: C, D, E...
    label.classList.add('visivel');

    guiaTimer = setTimeout(avancarGuia, 3000);
  }

  function avancarGuia() {
    if (!modoGuia) return;
    noteIdx++;
    tocarGuia();
  }

  /* ══════════════════════════════════════════════
     Teclado
  ══════════════════════════════════════════════ */
  AudioEngine.init();

  const kb = createPianoKeyboard(document.getElementById('piano-container'), {
    startNote: 'C4', endNote: 'C5',
    showLabels: true,
    responsive: true,
    labelMap: { 'C4': '𝄞', 'G4': '☀', 'C5': '𝄞' },
    onNoteOn(noteStr) {
      // Som animal (piano já soa via AudioEngine interno)
      if (instrumento !== 'piano') AnimalSynth[instrumento](noteToMidi(noteStr));

      // Modo guia: verifica nota certa
      if (modoGuia && notaEsperada) {
        if (guiaTimer) { clearTimeout(guiaTimer); guiaTimer = null; }
        if (noteStr === notaEsperada) {
          notaEsperada = null;
          songTimer = setTimeout(avancarGuia, 350);
        } else {
          guiaTimer = setTimeout(avancarGuia, 2500);
        }
      }
    },
  });

  // ── Instrumentos ──
  document.querySelectorAll('.instrumento-btn[data-inst]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.instrumento-btn').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      instrumento = btn.dataset.inst;
      Settings.setSoundOn(instrumento === 'piano');
      if (instrumento !== 'piano') getActx(); else AudioEngine.init();
      pararTudo();
    });
  });

  // ── Velocidade ──
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      speedPercent = parseInt(btn.dataset.speed, 10);
    });
  });

  // ── Botões de música (delegação no grid) ──
  grid.addEventListener('click', e => {
    const auto = e.target.closest('.btn-auto');
    const guia = e.target.closest('.btn-guia');
    const parar = e.target.closest('.btn-parar-card');
    if (auto)  iniciarMusica(parseInt(auto.dataset.idx, 10), false);
    if (guia)  iniciarMusica(parseInt(guia.dataset.idx, 10), true);
    if (parar) pararTudo();
  });

  // Restaura som ao sair
  window.addEventListener('pagehide',     () => Settings.setSoundOn(true));
  window.addEventListener('beforeunload', () => Settings.setSoundOn(true));

  // Ajusta altura do piano igual ao padrão dos outros módulos
  function ajustarTeclado() {
    const stage = document.getElementById('piano-stage');
    if (!stage) return;
    const disponivel = stage.clientHeight - 8;
    if (disponivel < 60) return;
    const keyH = Math.max(80, Math.min(disponivel, 300));
    stage.style.setProperty('--key-h',    keyH + 'px');
    stage.style.setProperty('--key-bk-h', Math.round(keyH * 0.62) + 'px');
  }
  window.addEventListener('resize', ajustarTeclado);
  window.addEventListener('orientationchange', () => setTimeout(ajustarTeclado, 150));
  requestAnimationFrame(() => requestAnimationFrame(ajustarTeclado));
  </script>
</body>
</html>
