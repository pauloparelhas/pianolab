<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PianoLab — M2: Escalas</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="piano.css">
  <style>
    html, body { height: 100%; overflow: hidden; }

    .piano-body {
      display: flex; flex-direction: column;
      height: 100dvh; background: #111827;
      max-width: 960px; margin: 0 auto;
    }

    /* ── PAINEL ──────────────────────────────────────────────── */
    .digital-panel {
      flex: 1; min-height: 0; background: #0d1117;
      display: flex; flex-direction: column;
      border-bottom: 3px solid #000; overflow: hidden;
    }
    @media (orientation: landscape) {
      .digital-panel { flex: 0 0 auto; max-height: 40dvh; overflow-y: auto; border-bottom: 1px solid #1a2535; }
    }

    /* ── TOPBAR (unificada: nav + fases + controles) ─────────── */
    .panel-topbar {
      display: flex; align-items: center; padding: 4px 6px; gap: 3px;
      background: #070d14; border-bottom: 1px solid #1a2535; flex-shrink: 0;
    }
    .panel-title {
      flex: 1; text-align: center; font-size: 0.6rem; letter-spacing: 2px;
      color: #4FC3F7; font-weight: 700; text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .panel-btn {
      width: 30px; height: 30px; background: #141e2e;
      border: 1px solid #263045; border-radius: 6px; color: #7a8fa8;
      font-size: 0.82rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }
    .panel-btn:active { background: #1e2e44; }
    .panel-btn:disabled { opacity: .3; pointer-events: none; }
    /* dots de fase no topbar */
    .fase-dots-row { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
    .fase-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #2a3a4a; border: 1px solid #3a4a5a; transition: background .2s;
    }
    .fase-dot.ativa { background: #4FC3F7; }
    .fase-dot.feita { background: #4CAF50; }

    /* ── BARRA DE TONALIDADE — maior e com instrução ─────────── */
    .chave-bar-wrap {
      background: #070d14; border-bottom: 1px solid #1a2535; flex-shrink: 0;
      padding: 4px 8px 5px;
    }
    .chave-instr {
      font-size: 0.5rem; color: #4a6274; text-align: center;
      letter-spacing: .5px; margin-bottom: 4px; font-weight: 600;
    }
    .chave-bar {
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .chave-dot {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 5px 7px; border-radius: 7px; cursor: pointer; touch-action: manipulation;
      transition: background .15s;
    }
    .chave-dot:active { background: rgba(79,195,247,.12); }
    .chave-dot__c {
      width: 11px; height: 11px; border-radius: 50%;
      background: #2a3a4a; border: 1.5px solid #3a4a5a; transition: background .2s;
    }
    .chave-dot__l { font-size: 0.48rem; font-weight: 700; color: #3a4a5a; transition: color .2s; }
    .chave-dot.ativo .chave-dot__c { background: #4FC3F7; border-color: #4FC3F7; }
    .chave-dot.ativo .chave-dot__l { color: #4FC3F7; }
    .chave-dot.feito .chave-dot__c { background: #4CAF50; border-color: #4CAF50; }
    .chave-dot.feito .chave-dot__l { color: #4CAF50; }

    /* ── CONTEÚDO ────────────────────────────────────────────── */
    .panel-content {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 10px; gap: 7px; overflow: hidden;
    }
    .screen { display: none; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
    .screen.active { display: flex; }

    .fase-label {
      font-size: 0.55rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #4a6274; align-self: flex-start;
    }
    .fase-titulo {
      font-size: clamp(1rem, 4vw, 1.4rem); font-weight: 900;
      color: #e8eaed; text-align: center; line-height: 1.2;
    }
    .fase-texto {
      font-size: clamp(0.66rem, 2.2vw, 0.80rem);
      color: #7a8fa8; text-align: center; line-height: 1.5;
    }

    /* ── VISUALIZADOR DE NOTAS DA ESCALA ─────────────────────── */
    .escala-vis {
      display: flex; align-items: center; gap: 2px; justify-content: center;
    }
    .escala-nota {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .escala-nota__circulo {
      width: clamp(26px, 6.5vw, 36px); height: clamp(26px, 6.5vw, 36px);
      border-radius: 50%; background: #1e2a3a; border: 2px solid #2a3a4a;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(0.38rem, 1.3vw, 0.58rem); font-weight: 700; color: #4a6274;
      transition: background .18s, border-color .18s, color .18s, transform .12s;
    }
    .escala-nota.ativa .escala-nota__circulo {
      background: #4FC3F7; border-color: #4FC3F7; color: #000; transform: scale(1.2);
    }
    .escala-nota.acerto .escala-nota__circulo {
      background: #4CAF50; border-color: #4CAF50; color: #fff;
    }
    .escala-nota__grau {
      font-size: clamp(0.34rem, 1vw, 0.46rem); color: #3a4a5a; font-weight: 700;
    }
    .escala-nota.ativa .escala-nota__grau,
    .escala-nota.acerto .escala-nota__grau { color: #e8eaed; }
    .escala-sep {
      font-size: clamp(0.32rem, 1vw, 0.44rem); color: #2a3a4a;
      font-weight: 700; padding-bottom: 10px;
    }

    /* ── PROGRESSO PRATICAR ──────────────────────────────────── */
    .pratica-prog {
      display: flex; gap: 6px; justify-content: center;
    }
    .pratica-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #1e2a3a; border: 1.5px solid #2a3a4a;
      transition: background .18s;
    }
    .pratica-dot.atual  { background: #4FC3F7; border-color: #4FC3F7; animation: pulsar .9s ease-in-out infinite; }
    .pratica-dot.acerto { background: #4CAF50; border-color: #4CAF50; }

    .pratica-status {
      font-size: clamp(0.72rem, 2.4vw, 0.88rem); font-weight: 700;
      color: #4FC3F7; text-align: center; min-height: 1.3em;
    }

    /* ── CELEBRAÇÃO ──────────────────────────────────────────── */
    .celebra-emoji { font-size: clamp(2rem, 9vw, 3rem); }
    .celebra-titulo { font-size: clamp(1.1rem, 4vw, 1.5rem); font-weight: 900; color: #fff; text-align: center; }
    .celebra-sub    { font-size: clamp(0.72rem, 2.4vw, 0.88rem); color: #7a8fa8; text-align: center; }
    .celebra-cont   { font-size: clamp(0.65rem, 2vw, 0.8rem); color: #4CAF50; font-weight: 700; }

    /* ── BOTÕES ──────────────────────────────────────────────── */
    .btn-acao {
      padding: 10px 20px; background: #141e2e;
      border: 1.5px solid #263045; border-radius: 10px;
      color: #4FC3F7; font-size: clamp(0.78rem, 2.4vw, 0.92rem);
      font-weight: 700; cursor: pointer; touch-action: manipulation;
      transition: background .15s;
    }
    .btn-acao:active { background: #1e2e44; border-color: #4FC3F7; }
    .btn-acao.destaque { background: #4FC3F7; color: #000; border-color: #4FC3F7; }
    .btn-acao:disabled { opacity: .35; cursor: default; pointer-events: none; }
    .btn-acao.sec { color: #7a8fa8; border-color: #1e2a3a; font-size: clamp(0.65rem, 2vw, 0.78rem); padding: 7px 14px; }

    /* ── TECLADO + PARTITURA ─────────────────────────────────── */
    /* JS (ajustarTeclado) define --key-h e --key-bk-h dinamicamente
       com base na altura real disponível. CSS define apenas fallback seguro. */
    .piano-stage {
      background: #111827; border-top: 3px solid #000; flex: 0 0 50dvh;
      display: flex; flex-direction: column;
      --key-h:    clamp(90px, 28dvh, 240px);
      --key-bk-h: clamp(54px, 17dvh, 144px);
    }
    @media (orientation: landscape) {
      .piano-stage {
        flex: 1; min-height: 0; border-top: none;
        --key-h:    clamp(55px, 42dvh, 180px);
        --key-bk-h: clamp(33px, 25dvh, 108px);
      }
    }
    #staff-container { flex-shrink: 0; padding: 2px 8px 0; background: #0d1117; border-bottom: 1px solid #1a2535; overflow-x: auto; }
    #piano-wrap { flex: 1; min-height: 0; display: flex; align-items: center; overflow: hidden; }
    #piano-wrap #piano-escalas { width: 100%; }
    .piano-stage .piano-wrap.responsive { overflow: visible; padding-bottom: 0; }
    .piano-stage .piano.responsive { width: 100%; }
    .piano-stage .key__label { font-size: clamp(0.38rem, 1.1vw, 0.54rem); font-weight: 700; color: #888; }
    .piano-stage .key { border-color: #444; }

    @keyframes pulsar { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes shake-tecla {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)}
      40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
    }
    .key.shake { animation: shake-tecla .35s ease-in-out; }
  </style>
</head>
<body>
<div class="piano-body">

  <div class="digital-panel">
    <div class="panel-topbar">
      <button class="panel-btn" onclick="goTo('index.html')" title="Menu do curso">⌂</button>
      <span class="panel-title">M2 · ESCALAS</span>
      <button class="panel-btn" id="btn-fase-prev" onclick="faseAnterior()">‹</button>
      <div class="fase-dots-row" id="fase-dots-row"></div>
      <button class="panel-btn" id="btn-fase-next" onclick="faseSeguinte()">›</button>
      <button class="panel-btn" onclick="showHelp(HELP_FASES[faseAtual])" title="Ajuda">?</button>
      <button class="panel-btn" onclick="cycleFontSize(this)" title="Tamanho do texto">A</button>
      <button class="panel-btn" id="btn-lock" onclick="LockMode.toggle(this)" title="Tela cheia">🔓</button>
      <button class="panel-btn" id="btn-sound" onclick="toggleSom()">🔊</button>
    </div>

    <div class="chave-bar-wrap">
      <div class="chave-instr">Escolha a escala que quer treinar:</div>
      <div class="chave-bar" id="chave-bar"></div>
    </div>

    <div class="panel-content">

      <!-- Intro -->
      <div class="screen" id="s-intro">
        <span class="fase-label">Aprenda</span>
        <div class="fase-titulo" id="intro-titulo"></div>
        <div class="escala-vis" id="escala-vis-intro"></div>
        <div class="fase-texto">Padrão: T T S T T T S &nbsp;·&nbsp; Tom=2 st &nbsp;·&nbsp; Semitom=1 st</div>
        <button class="btn-acao" onclick="irFase('demo')">▶ Demonstração</button>
      </div>

      <!-- Demo -->
      <div class="screen" id="s-demo">
        <span class="fase-label" id="demo-label">Ouça!</span>
        <div class="fase-titulo" id="demo-titulo"></div>
        <div class="escala-vis" id="escala-vis-demo"></div>
        <div class="fase-texto" id="demo-texto">As notas acendem uma a uma ✨</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
          <button class="btn-acao" id="btn-demo" onclick="iniciarDemo()">▶ Tocar</button>
          <button class="btn-acao sec" id="btn-demo-next" style="display:none" onclick="demoAvancar()">Próxima nota →</button>
        </div>
        <button class="btn-acao destaque" id="btn-ir-pratica" style="display:none" onclick="irFase('praticar')">Praticar →</button>
      </div>

      <!-- Praticar -->
      <div class="screen" id="s-praticar">
        <span class="fase-label">Sua vez!</span>
        <div class="fase-titulo" id="pratica-titulo"></div>
        <div class="escala-vis" id="escala-vis-pratica"></div>
        <div class="pratica-prog" id="pratica-prog"></div>
        <div class="pratica-status" id="pratica-status">Observe a nota acesa e toque no seu piano</div>
        <button class="btn-acao destaque" id="btn-pratica-next" onclick="praticaAvancar()">Próximo →</button>
      </div>

      <!-- Celebração -->
      <div class="screen" id="s-celebra">
        <div class="celebra-emoji">🌟</div>
        <div class="celebra-titulo" id="celebra-titulo"></div>
        <div class="celebra-sub">Você tocou as 8 notas da escala!</div>
        <div class="celebra-cont" id="celebra-cont"></div>
        <button class="btn-acao destaque" id="btn-proxima" onclick="proximaChave()"></button>
      </div>

    </div>

  </div>

  <div class="piano-stage" id="piano-stage">
    <div id="staff-container"></div>
    <div id="piano-wrap">
      <div id="piano-escalas"></div>
    </div>
  </div>

</div>
<script src="base.js"></script>
<script>
'use strict';

/* ══════════════════════════════════════════════════════════════
   TEORIA — 7 ESCALAS MAIORES
   Intervalos: T T S T T T S (T=2 st, S=1 st)
══════════════════════════════════════════════════════════════ */
const ESCALA_ST   = [0, 2, 4, 5, 7, 9, 11, 12];
const GRAUS       = ['I','II','III','IV','V','VI','VII','I'];
const INTERVALOS  = ['T','T','S','T','T','T','S'];
const NOMES_PT    = ['Dó','Dó♯','Ré','Ré♯','Mi','Fá','Fá♯','Sol','Sol♯','Lá','Lá♯','Si'];
const FASES_ORDEM = ['intro','demo','praticar','celebra'];

const CHAVES = [
  {raiz:'C4',label:'Dó'}, {raiz:'D4',label:'Ré'}, {raiz:'E4',label:'Mi'},
  {raiz:'F4',label:'Fá'}, {raiz:'G4',label:'Sol'},{raiz:'A4',label:'Lá'},
  {raiz:'B4',label:'Si'},
];

/* ── Textos de ajuda por fase ─────────────────────────────── */
const HELP_FASES = {
  intro:    '<b>Aprenda a escala</b><br>Veja as 7 notas da escala e a distância entre elas (T=Tom, S=Semitom). Clique em "Demonstração" para ouvir.',
  demo:     '<b>Ouça a escala</b><br>As notas acendem uma a uma no piano. Acompanhe com os olhos. Quando quiser treinar sozinho, clique em "Nota a nota" e avance no seu ritmo.',
  praticar: '<b>Sua vez!</b><br>Observe a nota que acende no piano. Toque a mesma nota no seu piano real, depois clique "Próximo →" para avançar.',
  celebra:  '<b>Parabéns!</b><br>Você tocou a escala inteira! Escolha outra tonalidade na barra acima para continuar praticando.',
};

/* ── Estado ───────────────────────────────────────────────── */
let chaveIdx    = 0;
let faseAtual   = 'intro';
let praticaStep = 0;
let demoTimer   = null;
let demoJaRodou = false;  // false = auto na próxima, true = manual
let demoStep    = 0;      // step atual do demo manual
const concluidasSession = new Set();

/* ── Piano (fixo C4-B5, criado uma vez) ──────────────────── */
const kb = createPianoKeyboard(
  document.getElementById('piano-escalas'),
  {
    startNote:'C4', endNote:'B5',
    showLabels:true, responsive:true,
    onNoteOn(noteStr) {
      if (Settings.getSoundOn()) AudioEngine.play(noteStr);
    }
  }
);

/* ── Staff ────────────────────────────────────────────────── */
const score = createStaffScore(document.getElementById('staff-container'));

/* ══════════════════════════════════════════════════════════════
   AJUSTE DINÂMICO DO PIANO
   Mede o espaço real disponível e define --key-h e --key-bk-h
   para que o piano nunca ultrapasse nem seja muito pequeno.
══════════════════════════════════════════════════════════════ */
function ajustarTeclado() {
  const stage    = document.getElementById('piano-stage');
  const staffEl  = document.getElementById('staff-container');
  if (!stage) return;
  const stageH   = stage.clientHeight;
  const staffH   = staffEl ? staffEl.offsetHeight : 0;
  // Margem de segurança: 4px abaixo, borda superior
  const disponivel = stageH - staffH - 4;
  if (disponivel < 40) return; // tela muito pequena — deixa CSS decidir
  // Limita ao mínimo razoável (60px) e ao máximo estético (280px)
  const keyH   = Math.max(60, Math.min(disponivel, 280));
  const keyBkH = Math.round(keyH * 0.62);
  stage.style.setProperty('--key-h',    keyH   + 'px');
  stage.style.setProperty('--key-bk-h', keyBkH + 'px');
}

// Chama após layout estabilizar e sempre que a tela mudar
window.addEventListener('resize', ajustarTeclado);
window.addEventListener('orientationchange', () => setTimeout(ajustarTeclado, 150));
// Duplo requestAnimationFrame: garante que o layout foi calculado
requestAnimationFrame(() => requestAnimationFrame(ajustarTeclado));

/* ── Helpers ──────────────────────────────────────────────── */
const nomePT    = midi => NOMES_PT[midi % 12];
const tonicMidi = ()   => noteToMidi(CHAVES[chaveIdx].raiz);
const escalaNotas = () => ESCALA_ST.map(st => tonicMidi() + st);

/* ── Partitura ────────────────────────────────────────────── */
function buildScore() {
  score.loadScore(escalaNotas().map(m => ({ midis:[m], duration:'q', label:nomePT(m) })));
}

/* ── Barra de tonalidade ──────────────────────────────────── */
function buildChaveBar() {
  const bar = document.getElementById('chave-bar');
  bar.innerHTML = '';
  CHAVES.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'chave-dot' +
      (i === chaveIdx           ? ' ativo' : '') +
      (concluidasSession.has(i) ? ' feito' : '');
    d.innerHTML = `<div class="chave-dot__c"></div><div class="chave-dot__l">${c.label}</div>`;
    d.onclick = () => { chaveIdx = i; demoJaRodou = false; irFase('intro'); };
    bar.appendChild(d);
  });
}

/* ── Visualizador de notas ────────────────────────────────── */
function buildVis(id, activeIdx = -1) {
  const el = document.getElementById(id);
  if (!el) return;
  const notas = escalaNotas();
  el.innerHTML = '';
  notas.forEach((midi, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'escala-sep';
      sep.textContent = INTERVALOS[i - 1];
      el.appendChild(sep);
    }
    const nota = document.createElement('div');
    nota.className = 'escala-nota' + (i === activeIdx ? ' ativa' : '');
    nota.innerHTML = `
      <div class="escala-nota__circulo">${nomePT(midi)}</div>
      <div class="escala-nota__grau">${GRAUS[i]}</div>`;
    el.appendChild(nota);
  });
}

/* ── Fase Nav ─────────────────────────────────────────────── */
function atualizarFaseNav() {
  const idx = FASES_ORDEM.indexOf(faseAtual);
  document.getElementById('btn-fase-prev').disabled = idx <= 0;
  document.getElementById('btn-fase-next').disabled = idx >= FASES_ORDEM.length - 1;
  const row = document.getElementById('fase-dots-row');
  row.innerHTML = '';
  FASES_ORDEM.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'fase-dot' + (i === idx ? ' ativa' : '') + (i < idx ? ' feita' : '');
    row.appendChild(d);
  });
}
function faseAnterior() { const i = FASES_ORDEM.indexOf(faseAtual); if (i > 0) irFase(FASES_ORDEM[i-1]); }
function faseSeguinte() { const i = FASES_ORDEM.indexOf(faseAtual); if (i < FASES_ORDEM.length-1) irFase(FASES_ORDEM[i+1]); }

/* ── Som ──────────────────────────────────────────────────── */
function toggleSom() {
  const on = !Settings.getSoundOn();
  Settings.setSoundOn(on);
  document.getElementById('btn-sound').textContent = on ? '🔊' : '🔇';
}

/* ══════════════════════════════════════════════════════════════
   DEMO — DUAS MODALIDADES
   1ª vez na escala: automático (900ms/nota) — mais devagar
   Vezes seguintes: nota a nota, aluno controla o ritmo
══════════════════════════════════════════════════════════════ */

function mostrarNotaDemo(idx) {
  const notas = escalaNotas();
  if (idx < 0 || idx >= notas.length) return;
  const nota = midiToNote(notas[idx]);
  kb.clearHighlights();
  kb.highlight(nota);
  score.highlight(idx);
  buildVis('escala-vis-demo', idx);
  if (Settings.getSoundOn()) AudioEngine.play(nota, 0.7); // duração em SEGUNDOS
}

function iniciarDemo() {
  if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
  kb.clearHighlights(); score.highlight(-1);

  if (!demoJaRodou) {
    // ── Modo automático (1ª vez) ────────────────────────────
    demoJaRodou = true;
    document.getElementById('btn-demo').disabled = true;
    document.getElementById('btn-demo-next').style.display = 'none';
    document.getElementById('btn-ir-pratica').style.display = 'none';
    document.getElementById('demo-texto').textContent = 'Ouça toda a escala…';

    const notas = escalaNotas();
    let i = 0;
    function passo() {
      if (i >= notas.length) {
        // fim do auto-demo
        kb.clearHighlights(); score.highlight(-1); buildVis('escala-vis-demo');
        document.getElementById('btn-demo').disabled = false;
        document.getElementById('btn-demo').textContent = '▶ Nota a nota';
        document.getElementById('demo-texto').textContent = 'Agora no seu ritmo — note a note';
        document.getElementById('btn-ir-pratica').style.display = '';
        return;
      }
      mostrarNotaDemo(i);
      i++;
      demoTimer = setTimeout(passo, 950); // 950ms por nota — ritmo calmo
    }
    passo();

  } else {
    // ── Modo nota a nota (vezes seguintes) ─────────────────
    demoStep = 0;
    document.getElementById('btn-demo').style.display = 'none';
    document.getElementById('btn-demo-next').style.display = '';
    document.getElementById('btn-ir-pratica').style.display = 'none';
    document.getElementById('demo-texto').textContent = 'Toque cada nota antes de avançar';
    mostrarNotaDemo(0);
  }
}

function demoAvancar() {
  // avança para próxima nota no modo manual
  const notas = escalaNotas();
  demoStep++;
  if (demoStep >= notas.length) {
    // fim
    kb.clearHighlights(); score.highlight(-1); buildVis('escala-vis-demo');
    document.getElementById('btn-demo-next').style.display = 'none';
    document.getElementById('btn-demo').style.display = '';
    document.getElementById('btn-demo').textContent = '▶ Repetir';
    document.getElementById('demo-texto').textContent = 'Escala completa!';
    document.getElementById('btn-ir-pratica').style.display = '';
  } else {
    mostrarNotaDemo(demoStep);
  }
}

/* ── Praticar (display-only) ──────────────────────────────── */
function iniciarPratica() {
  praticaStep = 0;
  kb.clearHighlights(); kb.clearHints();
  mostrarHint(); buildProgDots();
  const notas = escalaNotas();
  document.getElementById('pratica-status').textContent = `Nota 1 de ${notas.length}`;
  document.getElementById('btn-pratica-next').style.display = '';
}

function mostrarHint() {
  kb.clearHighlights();
  const notas = escalaNotas();
  if (praticaStep < notas.length) {
    kb.highlight(midiToNote(notas[praticaStep]));
    score.highlight(praticaStep);
    buildVis('escala-vis-pratica', praticaStep);
  }
}

function buildProgDots() {
  const prog = document.getElementById('pratica-prog');
  prog.innerHTML = '';
  ESCALA_ST.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pratica-dot' +
      (i === praticaStep ? ' atual'  : '') +
      (i <  praticaStep  ? ' acerto' : '');
    prog.appendChild(d);
  });
}

function praticaAvancar() {
  const notas = escalaNotas();
  praticaStep++;
  buildProgDots();
  if (praticaStep >= notas.length) {
    kb.clearHighlights(); score.highlight(-1);
    document.getElementById('pratica-status').textContent = '✓ Escala completa!';
    document.getElementById('btn-pratica-next').style.display = 'none';
    setTimeout(() => irFase('celebra'), 600);
  } else {
    mostrarHint();
    document.getElementById('pratica-status').textContent = `Nota ${praticaStep + 1} de ${notas.length}`;
  }
}

/* ── Celebração ───────────────────────────────────────────── */
function mostrarCelebracao() {
  concluidasSession.add(chaveIdx); buildChaveBar();
  document.getElementById('celebra-titulo').textContent = `Escala de ${CHAVES[chaveIdx].label} Maior!`;
  document.getElementById('celebra-cont').textContent   = `${concluidasSession.size} de ${CHAVES.length} escalas treinadas hoje`;
  document.getElementById('btn-proxima').textContent    =
    chaveIdx < CHAVES.length - 1 ? 'Próxima tonalidade →' : '← Voltar ao curso';
}

function proximaChave() {
  if (chaveIdx < CHAVES.length - 1) { chaveIdx++; demoJaRodou = false; irFase('intro'); }
  else goTo('index.html');
}

/* ── irFase ───────────────────────────────────────────────── */
function irFase(fase) {
  if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
  faseAtual = fase;
  kb.clearHighlights(); kb.clearHints(); score.highlight(-1);

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + fase).classList.add('active');

  buildChaveBar(); buildScore(); atualizarFaseNav();
  // Remeasure piano after panel content changes
  requestAnimationFrame(ajustarTeclado);

  const notas = escalaNotas();
  const label = CHAVES[chaveIdx].label;

  if (fase === 'intro') {
    demoJaRodou = false; // reset: próxima ida ao demo será automático
    document.getElementById('intro-titulo').textContent = `Escala de ${label} Maior`;
    buildVis('escala-vis-intro');
    score.highlight(0);
    kb.hint(midiToNote(notas[0]));
  }

  if (fase === 'demo') {
    document.getElementById('demo-titulo').textContent = `${label} Maior`;
    document.getElementById('demo-label').textContent  = 'Ouça!';
    document.getElementById('demo-texto').textContent  = demoJaRodou
      ? 'Toque cada nota antes de avançar'
      : 'As notas acendem uma a uma ✨';
    document.getElementById('btn-demo').textContent    = demoJaRodou ? '▶ Repetir' : '▶ Tocar';
    document.getElementById('btn-demo').style.display  = '';
    document.getElementById('btn-demo').disabled       = false;
    document.getElementById('btn-demo-next').style.display = 'none';
    document.getElementById('btn-ir-pratica').style.display = 'none';
    buildVis('escala-vis-demo');
    if (!demoJaRodou) {
      // Inicia automático sem clique na primeira visita
      iniciarDemo();
    }
  }

  if (fase === 'praticar') {
    document.getElementById('pratica-titulo').textContent = `Escala de ${label}`;
    iniciarPratica();
  }

  if (fase === 'celebra') {
    mostrarCelebracao();
  }
}

/* ── Init ─────────────────────────────────────────────────── */
(function() {
  document.getElementById('btn-sound').textContent = Settings.getSoundOn() ? '🔊' : '🔇';
  LockMode.listenChanges(document.getElementById('btn-lock'));
  irFase('intro');
})();
</script>
</body>
</html>
