<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>M0 · Bateria — PianoLab</title>
  <link rel="stylesheet" href="base.css">
  <style>
    html, body {
      height: 100dvh; max-height: 100dvh;
      margin: 0; overflow: hidden;
      background: #0a0d14;
      display: flex; flex-direction: column;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Topo ── */
    .topo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 4px;
      flex-shrink: 0;
    }
    .btn-voltar {
      background: none; border: none;
      color: #4FC3F7; font-size: 1.3rem;
      cursor: pointer; padding: 4px;
      line-height: 1;
    }
    .titulo {
      font-size: 1.4rem;
      font-weight: 900;
      color: #F9A825;
      letter-spacing: -0.5px;
    }

    /* ── Kit de bateria ── */
    .kit {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      padding: 4px 12px 12px;
      gap: 0;
    }

    /* Cada linha */
    .row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    /* ── Peça ── */
    .peca {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .peca svg {
      display: block;
      transition: transform 0.07s, filter 0.07s;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
    }
    .peca.hit svg {
      transform: scale(0.91) translateY(3px);
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4)) brightness(1.5);
    }
    .peca-nome {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #4a6070;
      transition: color 0.1s;
    }
    .peca.hit .peca-nome { color: #fff; }

    /* Landscape */
    @media (orientation: landscape) and (max-height: 500px) {
      .topo { padding: 4px 12px 2px; }
      .titulo { font-size: 1.1rem; }
      .kit { padding: 2px 8px 6px; }
      .row { gap: 8px; }
      .peca-nome { font-size: 0.58rem; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <button class="btn-voltar" onclick="location.href='m0_bebe.html'">←</button>
    <div class="titulo">🥁 Bateria</div>
  </div>

  <div class="kit">
    <div class="row" id="row-pratos"></div>
    <div class="row" id="row-tambores"></div>
    <div class="row" id="row-bumbo"></div>
  </div>

  <script src="base.js"></script>
  <script>
  'use strict';

  /* ══════════════════════════════════════════════
     Síntese de bateria — Web Audio API profissional
  ══════════════════════════════════════════════ */
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // Compressor master (evita clipping e dá punch)
  let compressor = null;
  function getComp() {
    if (compressor) return compressor;
    const c = getCtx();
    compressor = c.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value      = 6;
    compressor.ratio.value     = 4;
    compressor.attack.value    = 0.002;
    compressor.release.value   = 0.15;
    compressor.connect(c.destination);
    return compressor;
  }

  const Drum = {
    // Bumbo: sub + click, muito mais punch
    kick() {
      const c = getCtx(), out = getComp(), now = c.currentTime;

      // Sub-bass body
      const sub = c.createOscillator();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(110, now);
      sub.frequency.exponentialRampToValueAtTime(28, now + 0.28);
      const subG = c.createGain();
      subG.gain.setValueAtTime(2.5, now);
      subG.gain.exponentialRampToValueAtTime(0.001, now + 0.55);

      // Attack transient (click)
      const click = c.createOscillator();
      click.type = 'triangle';
      click.frequency.setValueAtTime(420, now);
      click.frequency.exponentialRampToValueAtTime(60, now + 0.025);
      const clkG = c.createGain();
      clkG.gain.setValueAtTime(1.8, now);
      clkG.gain.exponentialRampToValueAtTime(0.001, now + 0.04);

      sub.connect(subG); subG.connect(out);
      click.connect(clkG); clkG.connect(out);
      sub.start(now); click.start(now);
      sub.stop(now + 0.6); click.stop(now + 0.07);
    },

    // Caixa: crack tonal + chuveiro de ruído
    snare() {
      const c = getCtx(), out = getComp(), now = c.currentTime;

      // Corpo tonal
      const body = c.createOscillator();
      body.type = 'triangle';
      body.frequency.setValueAtTime(290, now);
      body.frequency.exponentialRampToValueAtTime(155, now + 0.07);
      const bG = c.createGain();
      bG.gain.setValueAtTime(1.4, now);
      bG.gain.exponentialRampToValueAtTime(0.001, now + 0.14);

      // Ruído das molas (snare wires)
      const buf = c.createBuffer(1, c.sampleRate * 0.28, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const noise = c.createBufferSource(); noise.buffer = buf;
      const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1800;
      const pk = c.createBiquadFilter(); pk.type = 'peaking'; pk.frequency.value = 7000; pk.gain.value = 8; pk.Q.value = 0.8;
      const nG = c.createGain();
      nG.gain.setValueAtTime(0.9, now);
      nG.gain.exponentialRampToValueAtTime(0.001, now + 0.28);

      body.connect(bG); bG.connect(out);
      noise.connect(hp); hp.connect(pk); pk.connect(nG); nG.connect(out);
      noise.start(now); body.start(now); body.stop(now + 0.18);
    },

    // Hi-Hat: conjunto de osciladores quadrados (timbre metálico real)
    hihat(open = false) {
      const c = getCtx(), out = getComp(), now = c.currentTime;
      const dur = open ? 0.55 : 0.09;

      // 6 parciais para timbre metálico (proporções da série da frequência fundamental)
      const freqs = [205.9, 310.8, 437.3, 523.3, 810.6, 1012.4];
      const merge = c.createGain(); merge.gain.value = 0.12;
      freqs.forEach(f => {
        const osc = c.createOscillator();
        osc.type = 'square';
        osc.frequency.value = f * (1 + (Math.random() - 0.5) * 0.015);
        osc.connect(merge); osc.start(now); osc.stop(now + dur + 0.05);
      });

      const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
      const env = c.createGain();
      env.gain.setValueAtTime(0.65, now);
      env.gain.exponentialRampToValueAtTime(0.001, now + dur);

      merge.connect(hp); hp.connect(env); env.connect(out);
    },

    // Tom: pitch sweep com ataque nítido
    tom(hz = 100) {
      const c = getCtx(), out = getComp(), now = c.currentTime;

      const osc = c.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(hz * 2.0, now);
      osc.frequency.exponentialRampToValueAtTime(hz, now + 0.04);
      osc.frequency.exponentialRampToValueAtTime(hz * 0.6, now + 0.32);

      // Click de ataque
      const ck = c.createOscillator(); ck.type = 'triangle'; ck.frequency.value = hz * 3.5;
      const ckG = c.createGain(); ckG.gain.setValueAtTime(0.6, now); ckG.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

      const gain = c.createGain();
      gain.gain.setValueAtTime(1.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.38);

      osc.connect(gain); gain.connect(out);
      ck.connect(ckG); ckG.connect(out);
      osc.start(now); ck.start(now);
      osc.stop(now + 0.45); ck.stop(now + 0.05);
    },

    // Prato (crash/ride): múltiplos parciais, decay longo
    cymbal(short = false) {
      const c = getCtx(), out = getComp(), now = c.currentTime;
      const dur = short ? 0.9 : 2.2;

      const freqs = [186.8, 241.3, 293.2, 402.8, 534.1, 661.2, 822.4];
      const merge = c.createGain(); merge.gain.value = 0.1;
      freqs.forEach(f => {
        const osc = c.createOscillator(); osc.type = 'square';
        osc.frequency.value = f * (1 + (Math.random() - 0.5) * 0.02);
        osc.connect(merge); osc.start(now); osc.stop(now + dur + 0.1);
      });

      const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 3200; bp.Q.value = 0.35;
      const env = c.createGain();
      env.gain.setValueAtTime(0.55, now);
      env.gain.exponentialRampToValueAtTime(0.001, now + dur);

      merge.connect(bp); bp.connect(env); env.connect(out);
    },
  };

  /* ══════════════════════════════════════════════
     SVG das peças — gradientes 3D
  ══════════════════════════════════════════════ */

  // Retorna SVG de prato (cymbal) com gradiente dourado 3D
  function svgPrato(w, h, ids) {
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h/0.46|0}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="${ids}bg" cx="42%" cy="38%" r="68%">
          <stop offset="0%"   stop-color="#ffe87a"/>
          <stop offset="45%"  stop-color="#c9970a"/>
          <stop offset="100%" stop-color="#7a5502"/>
        </radialGradient>
        <radialGradient id="${ids}bell" cx="44%" cy="34%" r="65%">
          <stop offset="0%"   stop-color="#fff0a0"/>
          <stop offset="60%"  stop-color="#d4a010"/>
          <stop offset="100%" stop-color="#8a6005"/>
        </radialGradient>
        <linearGradient id="${ids}hl" x1="20%" y1="0%" x2="80%" y2="100%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.35)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
      </defs>
      <!-- Sombra -->
      <ellipse cx="${w/2}" cy="${h/0.46*0.9|0}" rx="${w*0.44|0}" ry="${h*0.18|0}" fill="rgba(0,0,0,0.35)"/>
      <!-- Corpo do prato -->
      <ellipse cx="${w/2}" cy="${h/0.46*0.38|0}" rx="${w*0.48|0}" ry="${h/0.46*0.34|0}" fill="url(#${ids}bg)" stroke="#6a4600" stroke-width="1.5"/>
      <!-- Bell (centro elevado) -->
      <ellipse cx="${w/2}" cy="${h/0.46*0.3|0}" rx="${w*0.14|0}" ry="${h/0.46*0.18|0}" fill="url(#${ids}bell)" stroke="#8a6005" stroke-width="1"/>
      <!-- Highlight -->
      <ellipse cx="${w*0.36|0}" cy="${h/0.46*0.22|0}" rx="${w*0.2|0}" ry="${h/0.46*0.1|0}" fill="url(#${ids}hl)"/>
      <!-- Haste -->
      <line x1="${w/2}" y1="${h/0.46*0.72|0}" x2="${w/2}" y2="${h/0.46*0.92|0}" stroke="#445" stroke-width="3" stroke-linecap="round"/>
    </svg>`;
  }

  // Retorna SVG de tambor (tom/caixa) visto ligeiramente de cima
  function svgTambor(w, h, cor, cor2, corAro, ids, molas = false) {
    const cx = w / 2, cy = h * 0.42;
    const rx = w * 0.47, ryTop = h * 0.11, ryBot = h * 0.12;
    const bodyH = h * 0.44;
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="${ids}head" cx="40%" cy="32%" r="68%">
          <stop offset="0%"   stop-color="#f2f2f2"/>
          <stop offset="65%"  stop-color="#d0d0d0"/>
          <stop offset="100%" stop-color="#aaaaaa"/>
        </radialGradient>
        <linearGradient id="${ids}body" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="${cor2}"/>
          <stop offset="22%"  stop-color="${cor}"/>
          <stop offset="78%"  stop-color="${cor}"/>
          <stop offset="100%" stop-color="${cor2}"/>
        </linearGradient>
        <linearGradient id="${ids}hl" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
      </defs>
      <!-- Sombra embaixo -->
      <ellipse cx="${cx}" cy="${h*0.94}" rx="${rx*0.82}" ry="${ryBot*0.6}" fill="rgba(0,0,0,0.4)"/>
      <!-- Aro inferior -->
      <ellipse cx="${cx}" cy="${cy + bodyH}" rx="${rx}" ry="${ryBot}" fill="${cor2}" stroke="${cor2}" stroke-width="1"/>
      <!-- Corpo -->
      <rect x="${cx - rx}" y="${cy}" width="${rx*2}" height="${bodyH}" fill="url(#${ids}body)"/>
      <!-- Highlight no corpo -->
      <rect x="${cx - rx}" y="${cy}" width="${rx*2}" height="${bodyH}" fill="url(#${ids}hl)"/>
      ${molas ? `<path d="M${cx-rx*0.7} ${cy+bodyH*0.7} Q${cx-rx*0.4} ${cy+bodyH*0.6} ${cx} ${cy+bodyH*0.7} Q${cx+rx*0.4} ${cy+bodyH*0.8} ${cx+rx*0.7} ${cy+bodyH*0.7}" stroke="#ccc" stroke-width="1.3" fill="none" opacity="0.8"/>` : ''}
      <!-- Aro superior -->
      <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ryTop}" fill="${corAro}" stroke="${cor2}" stroke-width="1.5"/>
      <!-- Pele -->
      <ellipse cx="${cx}" cy="${cy*0.96}" rx="${rx*0.92}" ry="${ryTop*0.85}" fill="url(#${ids}head)"/>
      <!-- Parafusos decorativos -->
      <circle cx="${cx-rx*0.82}" cy="${cy+bodyH*0.35}" r="2.5" fill="#555"/>
      <circle cx="${cx+rx*0.82}" cy="${cy+bodyH*0.35}" r="2.5" fill="#555"/>
    </svg>`;
  }

  // Retorna SVG do bumbo visto de frente
  function svgBumbo(w, h) {
    const cx = w/2, cy = h*0.48, rx = w*0.46, ry = h*0.42;
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bk-face" cx="40%" cy="35%" r="68%">
          <stop offset="0%"   stop-color="#3a9040"/>
          <stop offset="55%"  stop-color="#1e6025"/>
          <stop offset="100%" stop-color="#0d3011"/>
        </radialGradient>
        <radialGradient id="bk-hl" cx="38%" cy="28%" r="55%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <radialGradient id="bk-head" cx="38%" cy="34%" r="65%">
          <stop offset="0%"   stop-color="#e8e8e8"/>
          <stop offset="70%"  stop-color="#c2c2c2"/>
          <stop offset="100%" stop-color="#999"/>
        </radialGradient>
      </defs>
      <!-- Sombra -->
      <ellipse cx="${cx}" cy="${h*0.95}" rx="${rx*0.8}" ry="${ry*0.12}" fill="rgba(0,0,0,0.45)"/>
      <!-- Aro metálico externo -->
      <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="none" stroke="#3a6040" stroke-width="5"/>
      <!-- Corpo do bumbo -->
      <ellipse cx="${cx}" cy="${cy}" rx="${rx*0.94}" ry="${ry*0.92}" fill="url(#bk-face)"/>
      <!-- Highlight de luz -->
      <ellipse cx="${cx}" cy="${cy}" rx="${rx*0.94}" ry="${ry*0.92}" fill="url(#bk-hl)"/>
      <!-- Pele frontal (translúcida) -->
      <ellipse cx="${cx}" cy="${cy}" rx="${rx*0.82}" ry="${ry*0.78}" fill="url(#bk-head)" opacity="0.12"/>
      <!-- Aro da pele -->
      <ellipse cx="${cx}" cy="${cy}" rx="${rx*0.82}" ry="${ry*0.78}" fill="none" stroke="#4a8050" stroke-width="3"/>
      <!-- Buraco de resonância -->
      <ellipse cx="${cx+rx*0.22}" cy="${cy+ry*0.1}" rx="${rx*0.16}" ry="${ry*0.15}" fill="#060e08"/>
      <!-- Pernas -->
      <line x1="${cx-rx*0.7}" y1="${cy+ry*0.85}" x2="${cx-rx*0.85}" y2="${h*0.97}" stroke="#556" stroke-width="4" stroke-linecap="round"/>
      <line x1="${cx+rx*0.7}" y1="${cy+ry*0.85}" x2="${cx+rx*0.85}" y2="${h*0.97}" stroke="#556" stroke-width="4" stroke-linecap="round"/>
    </svg>`;
  }

  /* ══════════════════════════════════════════════
     Peças do kit
  ══════════════════════════════════════════════ */
  const PECAS = [
    {
      id: 'crash', nome: 'Crash', row: 'pratos',
      hit: () => Drum.cymbal(false),
      build: (s) => svgPrato(s, s*0.46, 'cr'),
      base: 90,
    },
    {
      id: 'hihat', nome: 'Hi-Hat', row: 'pratos',
      hit: () => Drum.hihat(false),
      build: (s) => svgPrato(s*0.85, s*0.85*0.46, 'hh'),
      base: 80,
    },
    {
      id: 'ride', nome: 'Ride', row: 'pratos',
      hit: () => Drum.cymbal(true),
      build: (s) => svgPrato(s*1.1, s*1.1*0.46, 'ri'),
      base: 100,
    },
    {
      id: 'tom1', nome: 'Tom 1', row: 'tambores',
      hit: () => Drum.tom(185),
      build: (s) => svgTambor(s, s*1.1, '#c0392b', '#7a1010', '#aaa', 't1'),
      base: 80,
    },
    {
      id: 'snare', nome: 'Caixa', row: 'tambores',
      hit: () => Drum.snare(),
      build: (s) => svgTambor(s*1.2, s*0.7, '#555', '#222', '#999', 'sn', true),
      base: 100,
    },
    {
      id: 'tom2', nome: 'Tom 2', row: 'tambores',
      hit: () => Drum.tom(120),
      build: (s) => svgTambor(s*1.05, s*1.25, '#1565c0', '#0a3080', '#88b', 't2'),
      base: 90,
    },
    {
      id: 'kick', nome: 'Bumbo', row: 'bumbo',
      hit: () => Drum.kick(),
      build: (s) => svgBumbo(s, s*0.85),
      base: 200,
    },
  ];

  /* ══════════════════════════════════════════════
     Renderização e responsividade
  ══════════════════════════════════════════════ */
  const ROWS = {
    pratos:   document.getElementById('row-pratos'),
    tambores: document.getElementById('row-tambores'),
    bumbo:    document.getElementById('row-bumbo'),
  };

  // Cria cada peça
  PECAS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'peca';
    div.id = 'peca-' + p.id;
    div.innerHTML = `<div class="peca-svg">${p.build(p.base)}</div><span class="peca-nome">${p.nome}</span>`;

    div.addEventListener('pointerdown', e => {
      e.preventDefault();
      getCtx();
      p.hit();
      div.classList.add('hit');
      setTimeout(() => div.classList.remove('hit'), 130);
    });

    ROWS[p.row].appendChild(div);
  });

  // Ajusta tamanho de cada peça proporcionalmente ao espaço disponível
  function ajustarKit() {
    const kit = document.querySelector('.kit');
    const kitW = kit.clientWidth;
    const kitH = kit.clientHeight;

    // Determina escala baseada na menor dimensão disponível por linha
    const escala = Math.min(kitW / 340, kitH / 320, 1.6);

    PECAS.forEach(p => {
      const div = document.getElementById('peca-' + p.id);
      if (!div) return;
      const s = p.base * escala;
      div.querySelector('.peca-svg').innerHTML = p.build(s);
    });
  }

  window.addEventListener('resize', ajustarKit);
  window.addEventListener('orientationchange', () => setTimeout(ajustarKit, 150));
  requestAnimationFrame(() => requestAnimationFrame(ajustarKit));
  </script>
</body>
</html>
